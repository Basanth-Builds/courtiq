name = "court-iq-web"
main = ".open-next/worker.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
NEXT_PUBLIC_APP_NAME = "Court IQ"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "courtiq-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace with actual ID after running: wrangler d1 create courtiq-db
